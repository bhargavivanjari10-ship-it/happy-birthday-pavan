<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Pavan ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4d6d,#ff99c8,#ffd6e0);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
}

.container{
padding:20px;
animation:fade 2s;
}

img{
width:220px;
height:220px;
border-radius:20px;
object-fit:cover;
border:5px solid white;
box-shadow:0 0 25px white;
margin-bottom:20px;
}

h1{
font-size:38px;
animation:glow 2s infinite alternate;
}

p{
margin-top:20px;
font-size:20px;
line-height:1.8;
}

button{
margin-top:25px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:white;
color:#ff3366;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
font-size:30px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-100vh);
opacity:1;
}
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 30px yellow;}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<img src="pavan.jpg">

<h1>🎂 Happy Birthday Pavan ❤️</h1>

<p id="msg">
Tap the button below ❤️
</p>

<button onclick="showMessage()">Open Surprise 🎁</button>

<audio id="song" src="dooron.mp3"></audio>

</div>

<script>

for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*5)+"s";
h.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(h);
}

function showMessage(){

document.getElementById("song").play();

document.getElementById("msg").innerHTML=`
💌 Dear Pavan,<br><br>

Happy Birthday! 🎂❤️<br><br>

Today is all about celebrating you.<br>

May your life always be filled with happiness,
success, peace and endless smiles.<br><br>

You are a wonderful person,
and I hope every dream you have
comes true this year.<br><br>

Keep smiling 😊<br>
Keep shining ✨<br>
Stay blessed always ❤️<br><br>

<b>Happy Birthday Once Again, Pavan! 🎉🎂❤️</b><br><br>

— Your Friend 🌸
`;

confetti();

}

function confetti(){
for(let i=0;i<150;i++){
let c=document.createElement("div");
c.innerHTML="🎉";
c.style.position="absolute";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.fontSize="25px";

document.body.appendChild(c);

let pos=0;

let fall=setInterval(()=>{
pos+=5;
c.style.top=pos+"px";
if(pos>window.innerHeight){
clearInterval(fall);
c.remove();
}
},20);

}
}

</script>

</body>
</html>
